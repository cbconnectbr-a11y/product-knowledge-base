[pytest]
# Pytest configuration for product knowledge base

markers =
    integration: Integration tests that require a real database connection (deselect with '-m "not integration"')

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Minimum Python version
minversion = 3.8
